DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>David</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Syne:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a0a2e;
      --card: rgba(30, 10, 55, 0.85);
      --accent: #b06aff;
      --text: #e8d5ff;
      --muted: rgba(200,180,255,0.5);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === Animated background === */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(90,20,160,0.55) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(160,40,90,0.4) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(20,5,40,1) 0%, transparent 100%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { filter: brightness(1); }
      100% { filter: brightness(1.15); }
    }

    /* === Card === */
    .card {
      position: relative;
      z-index: 1;
      width: min(90vw, 420px);
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(180,120,255,0.18);
      border-radius: 28px;
      padding: 48px 32px 36px;
      text-align: center;
      box-shadow: 0 8px 60px rgba(80,0,160,0.45), 0 2px 12px rgba(0,0,0,0.5);
      margin: 32px 0;
    }

    /* === Name section === */
    .name-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }

    .name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.2rem, 9vw, 3.2rem);
      background: linear-gradient(90deg, #ff6ec7, #ffe66d, #6effd5, #6ec6ff, #b06aff, #ff6ec7);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 4s linear infinite;
      position: relative;
      z-index: 2;
    }
    @keyframes shine {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    /* === Rainbow sparkles canvas === */
    #sparkles {
      position: absolute;
      inset: -24px -32px;
      pointer-events: none;
      z-index: 1;
    }

    /* === Divider === */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 28px;
      border-radius: 2px;
    }

    /* === Discord presence === */
    .discord-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 32px;
      letter-spacing: 0.04em;
    }
    .discord-status svg { width: 18px; height: 18px; opacity: 0.7; }

    /* === Social icons === */
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      text-decoration: none;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: inherit;
    }
    .social-btn:hover {
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 8px 28px rgba(180,100,255,0.35);
      background: rgba(255,255,255,0.12);
    }
    .social-btn svg, .social-btn img {
      width: 26px;
      height: 26px;
      fill: white;
      position: relative;
      z-index: 1;
    }

    /* Highlight colors on hover */
    .btn-tg:hover   { box-shadow: 0 8px 28px rgba(41,182,246,0.45); }
    .btn-tt:hover   { box-shadow: 0 8px 28px rgba(255,255,255,0.25); }
    .btn-ig:hover   { box-shadow: 0 8px 28px rgba(225,48,108,0.45); }

    /* === Views === */
    .views {
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
    }
    .views svg { width: 16px; height: 16px; opacity: 0.6; }
  </style>
</head>

<script>
// ===== Rainbow sparkles =====
const canvas = document.getElementById('sparkles');
const wrap   = canvas.parentElement;
const ctx    = canvas.getContext('2d');

let W, H, particles = [];

function resize() {
  const r = wrap.getBoundingClientRect();
  W = canvas.width  = r.width  + 64;
  H = canvas.height = r.height + 48;
}

function randomParticle() {
  const colors = [
    '#ff6ec7','#ff9de2','#ffe66d','#6effd5',
    '#6ec6ff','#b06aff','#ff8a65','#69f0ae'
  ];
  const size = Math.random() * 4 + 1.5;
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6 - 0.3,
    alpha: Math.random(),
    color: colors[Math.floor(Math.random() * colors.length)],
    size,
    life: 0,
    maxLife: 80 + Math.random() * 120,
    shape: Math.random() > 0.5 ? 'star' : 'dot'
  };
}

function drawStar(cx, cy, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  ctx.translate(cx, cy);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const b = (i * 4 * Math.PI) / 5 + (2 * Math.PI) / 5 - Math.PI / 2;
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    ctx.lineTo(Math.cos(b) * (r * 0.4), Math.sin(b) * (r * 0.4));
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function tick() {
  ctx.clearRect(0, 0, W, H);

  // spawn
  if (particles.length < 55) {
    particles.push(randomParticle());
  }

  particles.forEach((p, i) => {
    p.life++;
    p.x += p.vx;
    p.y += p.vy;
    const progress = p.life / p.maxLife;
    const alpha = progress < 0.3
      ? progress / 0.3
      : 1 - (progress - 0.3) / 0.7;

    if (p.shape === 'star') {
      drawStar(p.x, p.y, p.size, p.color, alpha * 0.9);
    } else {
      ctx.save();
      ctx.globalAlpha = alpha * 0.85;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    if (p.life >= p.maxLife) {
      particles[i] = randomParticle();
    }
  });

  requestAnimationFrame(tick);
}

resize();
window.addEventListener('resize', resize);
tick();
</script>
